/* ----------------------------- helpers ----------------------------- */
const dayMs = 86400000;
const daysBetween = (a, b) => Math.round((new Date(b).setHours(0, 0, 0, 0) - new Date(a).setHours(0, 0, 0, 0)) / dayMs);
const fmtDate = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—";
const fmtShort = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—";

function layout(connectors) {
  const n = connectors.length || 1;
  const positions = {};
  connectors.forEach((c, i) => {
    const angle = (-90 + (360 / n) * i) * (Math.PI / 180);
    const r = i % 2 === 0 ? 43 : 33;
    positions[c.id] = { x: 50 + r * Math.cos(angle), y: 50 + r * Math.sin(angle) };
  });
  return positions;
}
const STORAGE_KEY = "iscu-accesssoftek-connectormap-data-v3";
const clone = (o) => (typeof structuredClone === "function" ? structuredClone(o) : JSON.parse(JSON.stringify(o)));

/* ================================================================ */
function ConnectorMap() {

  const [selected, setSelected] = useState(null);
  const [hovered, setHovered] = useState(null);

  const [statusFilter, setStatusFilter] = useState(null);

  const [narrow, setNarrow] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [modal, setModal] = useState(null); // 'export' | 'import' | 'help'
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    const onResize = () => setNarrow(window.innerWidth < 760);
    onResize(); window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.connectors)) setData(parsed);
      }
    } catch (e) { /* fall back to built-in */ }
  }, []);

  const save = useCallback((next) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch (e) {}
    setSaved(true); setTimeout(() => setSaved(false), 1400);
  }, []);

  // single mutation entry point: clone -> mutate -> set + persist
  const update = useCallback((mutator) => {
    setData((prev) => { const next = clone(prev); mutator(next); save(next); return next; });
  }, [save]);
  const patchConn = useCallback((id, fn) => update((d) => { const c = d.connectors.find((x) => x.id === id); if (c) fn(c); }), [update]);

  const connectors = data.connectors;
  const positions = useMemo(() => layout(connectors), [connectors]);

  const stats = useMemo(() => {
    let done = 0, total = 0; const perNode = {}; const byStatus = {};
    connectors.forEach((c) => {
      let d = 0, t = 0;
      (c.milestones || []).forEach((m) => { t++; if (m.done) d++; });
      (c.mustDos || []).forEach((m) => { t++; if (m.done) d++; });
      perNode[c.id] = t ? d / t : 0; done += d; total += t;
      byStatus[c.status] = (byStatus[c.status] || 0) + 1;
    });
    return { pct: total ? Math.round((done / total) * 100) : 0, perNode, byStatus, total: connectors.length };
  }, [connectors]);

  const today = new Date().toISOString().slice(0, 10);
  const daysToGo = daysBetween(today, data.project.goLive);
  const visible = useCallback((c) => {
    if (catFilter && c.category !== catFilter) return false;
    if (statusFilter && c.status !== statusFilter) return false;
    return true;
  }, [catFilter, statusFilter]);
  const active = selected ? connectors.find((c) => c.id === selected) : null;

  const addConnector = () => {

    update((d) => d.connectors.push({
      id, name: "New connector", vendor: "", category: "servicing", direction: "both",
      status: "not_started", crit: 2, summary: "", dataFlow: "", team: [],
      start: today, target: data.project.goLive, milestones: [], mustDos: [],
      training: { needed: false, plan: "" }, dependencies: "",
    }));
    setSelected(id);
  };
  const deleteConnector = (id) => {
    update((d) => { d.connectors = d.connectors.filter((c) => c.id !== id); });
    setSelected(null);
  };
  const importData = (obj) => {
    if (!obj || !Array.isArray(obj.connectors) || !obj.project) throw new Error("bad shape");
    setData(obj); save(obj); setModal(null); setSelected(null);
  };
  const resetBuiltIn = () => { if (confirm("Reset to the built-in Asana snapshot? Your current edits will be replaced.")) { setData(DEFAULT_DATA); save(DEFAULT_DATA); setSelected(null); } };

        </div>
        <div className="hdr-right">

            <div className="metric-sub mono">{fmtDate(data.project.goLive)} · est.</div>
          </div>
          <div className="metric">
            <div className="metric-val mono">{stats.pct}%</div>
            <div className="metric-lbl mono">tasks complete</div>
            <div className="bar"><span style={{ width: `${stats.pct}%` }} /></div>
          </div>
        </div>
      </header>

      <ProgramRail program={data.program} today={today} />

      <div className="controls">
        <div className="statchips">
          <StatChip n={stats.total} label="connectors" color="#0F1B2D"

            <StatChip key={k} n={stats.byStatus[k]} label={v.label} color={v.color}
              active={statusFilter === k} onClick={() => setStatusFilter(statusFilter === k ? null : k)} />
          ) : null)}
        </div>
        <div className="right-controls">
          {saved && <span className="saved mono"><Check size={12} /> Saved</span>}
          <div className="toggle mono">
            <button className={view === "map" ? "on" : ""} onClick={() => setView("map")}><MapIcon size={14} /> Map</button>
            <button className={view === "list" ? "on" : ""} onClick={() => setView("list")}><ListIcon size={14} /> List</button>
          </div>
          <button className={`iconbtn mono ${editMode ? "edit-on" : ""}`} onClick={() => setEditMode((e) => !e)}>
            <Pencil size={13} /> {editMode ? "Editing" : "Edit"}
          </button>
          <button className="iconbtn mono" onClick={() => setModal("help")} title="How to update"><HelpCircle size={14} /></button>
        </div>
      </div>

      {editMode && (
        <EditBar data={data} update={update} onAdd={addConnector}
          onExport={() => setModal("export")} onImport={() => setModal("import")} onReset={resetBuiltIn} />
      )}

      <div className="legend">
        {Object.entries(CATEGORIES).map(([k, v]) => {
          const Icon = v.icon; const on = catFilter === k;
          return (
            <button key={k} className={`legend-item ${on ? "on" : ""}`}
              style={on ? { borderColor: v.color, background: v.color + "14" } : {}} onClick={() => setCatFilter(on ? null : k)}>
              <span className="dot" style={{ background: v.color }} /><Icon size={13} style={{ color: v.color }} />
              <span className="mono">{v.label}</span>
            </button>
          );
        })}
      </div>

      {view === "map" ? (
        <Diagram connectors={connectors} positions={positions} stats={stats} hovered={hovered}
          setHovered={setHovered} visible={visible} onSelect={setSelected} selected={selected} narrow={narrow} />
      ) : (
        <ListView connectors={connectors} stats={stats} visible={visible} onSelect={setSelected} />
      )}

      <footer className="ftr mono">
        Wire style shows status · dashed = not started/deferred · solid = in build · bold = live.
        {editMode ? " Editing on — changes auto-save. Export to SharePoint when done." : " Tap any connector to open its plan."}
      </footer>

      {active && (
        <Detail c={active} editMode={editMode} onClose={() => setSelected(null)}
          patchConn={patchConn} onDelete={() => deleteConnector(active.id)} progress={stats.perNode[active.id]} />
      )}

      {modal === "export" && <ExportModal data={data} onClose={() => setModal(null)} />}
      {modal === "import" && <ImportModal onClose={() => setModal(null)} onImport={importData} />}
      {modal === "help" && <HelpModal onClose={() => setModal(null)} />}
    </div>
  );
}

/* ----------------------------- edit bar ----------------------------- */

/* ----------------------------- program rail ----------------------------- */
function ProgramRail({ program, today }) {
  const items = [...program].sort((a, b) => a.date.localeCompare(b.date));
  const nextIdx = items.findIndex((m) => m.date >= today);
  return (
    <div className="rail">
      {items.map((m, i) => {
        const past = m.date < today; const isNext = i === nextIdx;
        return (
          <div key={i} className={`rail-item ${past ? "past" : ""} ${isNext ? "next" : ""}`}>
            <div className="rail-dot" />
            <div className="rail-date mono">{fmtShort(m.date)}</div>
            <div className="rail-label">{m.label}</div>
          </div>
        );
      })}
    </div>
  );
}

/* ----------------------------- diagram ----------------------------- */
function Diagram({ connectors, positions, stats, hovered, setHovered, visible, onSelect, selected, narrow }) {
  const focus = hovered || selected;
  const nodeW = narrow ? 132 : 158;
  return (
    <div className="diagram">
      <div className="grid-bg" />
      <svg className="wires" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
        {connectors.map((c) => {
          const p = positions[c.id]; if (!p) return null;
          const cat = CATEGORIES[c.category] || CATEGORIES.servicing;
          const vis = visible(c); const dim = focus && focus !== c.id;
          const w = c.status === "complete" ? 3.4 : (c.status === "not_started" || c.status === "deferred") ? 1.4 : 2.2;
          const dash = (c.status === "not_started" || c.status === "deferred") ? "5 7" : c.status === "at_risk" ? "10 5" : "0";
          return (
            <line key={c.id} x1="500" y1="500" x2={p.x * 10} y2={p.y * 10} stroke={cat.color} strokeWidth={w}
              strokeDasharray={dash} strokeLinecap="round" opacity={!vis ? 0.06 : dim ? 0.14 : 0.85}
              className={c.status === "in_progress" && vis && !dim ? "wire-flow" : ""} />
          );
        })}
        <circle cx="500" cy="500" r="6" fill="#0F1B2D" opacity="0.25" />
      </svg>

      <div className="hub" onClick={() => onSelect(null)}>
        <div className="hub-inner"><div className="hub-name">Access<br />Softek</div><div className="hub-sub mono">ONLINE BANKING HUB</div></div>
      </div>

      {connectors.map((c) => {
        const p = positions[c.id]; if (!p) return null;
        const cat = CATEGORIES[c.category] || CATEGORIES.servicing; const Icon = cat.icon;
        const st = STATUS[c.status] || STATUS.not_started; const Dir = (DIRECTION[c.direction] || DIRECTION.both).glyph;
        const vis = visible(c); const dim = focus && focus !== c.id; const prog = Math.round(stats.perNode[c.id] * 100);
        return (
          <button key={c.id} className={`node ${selected === c.id ? "sel" : ""}`}
            style={{ left: `${p.x}%`, top: `${p.y}%`, width: nodeW, opacity: !vis ? 0.25 : dim ? 0.4 : 1,
              borderColor: selected === c.id ? cat.color : "#E2E8F0",
              boxShadow: selected === c.id ? `0 0 0 2px ${cat.color}, 0 8px 24px rgba(15,27,45,.14)` : undefined }}
            onMouseEnter={() => setHovered(c.id)} onMouseLeave={() => setHovered(null)} onClick={() => onSelect(c.id)}>
            <span className="node-bar" style={{ background: cat.color }} />
            <span className="node-icon" style={{ color: cat.color, background: cat.color + "16" }}><Icon size={15} /></span>
            <span className="node-body">
              <span className="node-name">{c.name}</span>
              <span className="node-meta mono">
                <span className="node-status" style={{ color: st.color }}><span className="pip" style={{ background: st.color }} /> {st.label}</span>
                <Dir size={11} style={{ opacity: 0.5 }} />
                {c.crit >= 3 && <Flame size={11} style={{ color: "#D64545" }} />}
                {c.status === "deferred" && <PauseCircle size={11} style={{ opacity: 0.55 }} />}
              </span>
              <span className="node-prog"><span style={{ width: `${prog}%`, background: cat.color }} /></span>
            </span>
          </button>
        );
      })}
    </div>
  );
}

/* ----------------------------- modals ----------------------------- */
function ExportModal({ data, onClose }) {
  const json = useMemo(() => JSON.stringify(data, null, 2), [data]);
  const [copied, setCopied] = useState(false);
  const fname = `access-softek-map-${new Date().toISOString().slice(0, 10)}.json`;
  const copy = async () => {
    try { await navigator.clipboard.writeText(json); } catch (e) {
      const ta = document.getElementById("exp-ta"); ta.select(); document.execCommand("copy");
    }
    setCopied(true); setTimeout(() => setCopied(false), 1500);
  };
  const download = () => {
    try {
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob); const a = document.createElement("a");
      a.href = url; a.download = fname; document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch (e) { copy(); }
  };
  return (
    <Modal title="Export — save your working file" onClose={onClose}>
      <p className="modal-p">This is your source of truth. Save it to the shared SharePoint/OneDrive folder so the next person can pick up from here. Download the file, or copy the text into a saved <span className="mono">.json</span> file.</p>
      <textarea id="exp-ta" className="in ta mono json-ta" readOnly value={json} rows={9} />
      <div className="modal-actions">
        <button className="editbar-btn primary mono" onClick={download}><Download size={14} /> Download {fname}</button>
        <button className="editbar-btn mono" onClick={copy}>{copied ? <><Check size={14} /> Copied</> : <><Copy size={14} /> Copy JSON</>}</button>
      </div>
    </Modal>
  );
}
function ImportModal({ onClose, onImport }) {
  const [text, setText] = useState(""); const [err, setErr] = useState("");
  const load = (str) => { try { onImport(JSON.parse(str)); } catch (e) { setErr("That doesn't look like a valid map file. Check you copied the whole thing."); } };
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = () => load(String(r.result)); r.readAsText(f);
  };
  return (
    <Modal title="Import — load the latest file" onClose={onClose}>
      <p className="modal-p">Load the most recent file from your shared folder. Pick the <span className="mono">.json</span> file, or paste its contents below. This replaces what's currently shown.</p>
      <label className="filepick mono"><Upload size={14} /> Choose .json file<input type="file" accept="application/json,.json" onChange={onFile} hidden /></label>
      <div className="or mono">or paste</div>
      <textarea className="in ta mono json-ta" value={text} onChange={(e) => { setText(e.target.value); setErr(""); }} rows={7} placeholder="Paste the file contents here…" />
      {err && <div className="modal-err mono">{err}</div>}
      <div className="modal-actions"><button className="editbar-btn primary mono" onClick={() => load(text)} disabled={!text.trim()}>Load this data</button></div>
    </Modal>
  );
}
function HelpModal({ onClose }) {
  return (
    <Modal title="How to update this map" onClose={onClose}>
      <div className="help">
        <p className="modal-p">This map is a curated status view for the Access Softek conversion. It is <strong>not</strong> connected to Asana live — you keep it current by hand, and it takes about five minutes a week.</p>
        <ol className="help-ol">
          <li><strong>Get the latest file.</strong> Turn on <span className="pill">Edit</span>, click <span className="pill">Import</span>, and load the newest <span className="mono">.json</span> from the shared SharePoint folder.</li>
          <li><strong>Make your updates.</strong> Click a connector to open it. Change its status, dates, team, and check off milestones and must-dos. Use <span className="pill">New connector</span> to add one, or the trash icon to remove. Everything auto-saves as you go.</li>
          <li><strong>Save it back.</strong> Click <span className="pill">Export</span>, download the file, and replace the one in the shared folder. That file is the source of truth for the next person.</li>
        </ol>
        <p className="modal-p"><strong>Need a bulk refresh from Asana?</strong> Rather than hand-entering a lot of changes, ask the person who set this up to re-pull Asana and merge the updates — the curated descriptions stay intact. This is on-request, never automatic.</p>
        <p className="modal-p muted">Tip: your edits also save automatically in this browser, so you won't lose work if you refresh. The shared file is how everyone stays in sync.</p>
      </div>
    </Modal>
  );
}
function Modal({ title, onClose, children }) {
  return (
    <>
      <div className="scrim" onClick={onClose} />
      <div className="modal" role="dialog">
        <div className="modal-hd"><h3>{title}</h3><button className="close" onClick={onClose}><X size={18} /></button></div>
        <div className="modal-body">{children}</div>
      </div>
    </>
  );
}

const CSS = `
